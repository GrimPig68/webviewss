<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1" />
  <meta name="referrer" content="origin">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>
  <iframe
    src="https://www.youtube.com/embed?listType=playlist&list=PLvahqwMqN4M3M-DWpE8ABj0I0-3LgEUF5&autoplay=1&mute=1&playsinline=1&controls=0&loop=1"
    referrerpolicy="origin"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</body>
</html>
